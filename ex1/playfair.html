<!DOCTYPE html>
<html>
<head>
    <title>Cryptography Algorithms</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .page { display: none; }
        a { color: blue; cursor: pointer; text-decoration: underline; }
        input, textarea { margin: 5px 0; width: 300px; }
        button { margin: 5px; }
        table, td {
            border: 1px solid black;
            border-collapse: collapse;
            padding: 8px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div id="home" class="page" style="display:block;">
    <h1>Cryptography Techniques</h1>
    <ul>
        
        <li><a onclick="showPage('playfair')">Playfair Cipher</a></li>
    </ul>
</div>



<div id="playfair" class="page">
    <h2>Playfair Cipher</h2>

    <input id="playfairText" placeholder="Plaintext"><br>
    <input id="playfairKey" placeholder="Key"><br>

    <button onclick="playfairEncrypt()">Encrypt</button>
    

    <h3>5×5 Key Matrix</h3>
    <div id="matrixTable"></div>

    <p id="playfairResult"></p>
    <a onclick="showPage('home')">Back</a>
</div>

<script>
function showPage(p){
    document.querySelectorAll(".page").forEach(x=>x.style.display="none");
    document.getElementById(p).style.display="block";
}



/* ========= CORRECTED PLAYFAIR ========= */
function buildPlayfairMatrix(key){
    key = key.toUpperCase().replace(/J/g,"I").replace(/[^A-Z]/g,"");
    let used = new Set();
    let seq = key + "ABCDEFGHIKLMNOPQRSTUVWXYZ";
    let mat = [];
    for(let c of seq){
        if(!used.has(c)){
            used.add(c); mat.push(c);
        }
    }
    return mat;
}

function drawMatrix(mat){
    let html = "<table>";
    for(let i=0; i<5; i++){
        html += "<tr>";
        for(let j=0; j<5; j++) html += "<td>" + mat[i*5+j] + "</td>";
        html += "</tr>";
    }
    html += "</table>";
    matrixTable.innerHTML = html;
}

function playfairEncrypt() {
    let rawText = playfairText.value.toUpperCase().replace(/J/g,"I").replace(/[^A-Z]/g,"");
    let key = playfairKey.value;
    if(!key){ alert("Enter key"); return; }

    // 1. PREPROCESS TEXT: Handle double letters (e.g., BALLOON -> BALXLOON)
    let preparedText = "";
    for (let i = 0; i < rawText.length; i++) {
        preparedText += rawText[i];
        if (i + 1 < rawText.length) {
            if (rawText[i] === rawText[i + 1]) {
                preparedText += "X"; // Insert filler if next char is identical
            } else {
                preparedText += rawText[i + 1];
                i++; // Skip paired char
            }
        }
    }
    // Add trailing X if length is odd
    if (preparedText.length % 2 !== 0) preparedText += "X";

    // 2. BUILD MATRIX
    let mat = buildPlayfairMatrix(key);
    drawMatrix(mat);

    // 3. ENCRYPT DIGRAPHS
    let res = "";
    for(let i=0; i < preparedText.length; i += 2){
        let a = mat.indexOf(preparedText[i]);
        let b = mat.indexOf(preparedText[i+1]);
        let r1 = Math.floor(a/5), c1 = a%5;
        let r2 = Math.floor(b/5), c2 = b%5;

        if(r1 === r2){ // Same Row: Move Right
            res += mat[r1 * 5 + (c1 + 1) % 5];
            res += mat[r2 * 5 + (c2 + 1) % 5];
        }
        else if(c1 === c2){ // Same Column: Move Down
            res += mat[((r1 + 1) % 5) * 5 + c1];
            res += mat[((r2 + 1) % 5) * 5 + c2];
        }
        else { // Rectangle: Swap Columns
            res += mat[r1 * 5 + c2];
            res += mat[r2 * 5 + c1];
        }
    }
    playfairResult.innerText = res;
}


</script>

</body>
</html>
